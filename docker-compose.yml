version: "3.9"

services:
  # Databases
  mongo-auth:
    # MongoDB does not have an official Alpine image.
    # Use the bitnami version which is significantly more optimized/smaller than official.
    image: mongo
    ports: ["27017:27017"]

  mongo-crm:
    image: mongo
    ports: ["27018:27017"]

  redis:
    # Official Alpine image is available and very stable.
    image: redis:7.2-alpine
    restart: always

  zookeeper:
    # Confluent images are heavy. Bitnami's are built on Minideb (tiny Debian)
    # and are much smaller than the standard cp-zookeeper.
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    # Bitnami Kafka is the industry standard for lightweight Kafka deployments.
    image: bitnami/kafka:latest
    depends_on: [zookeeper]
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
